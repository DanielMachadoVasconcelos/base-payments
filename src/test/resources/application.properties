# Tests use explicit localhost infrastructure. In CI, GitHub Actions starts
# docker-ci.yml before Gradle runs; locally, run compose.yaml when integration
# tests need PostgreSQL and Kafka.
spring.docker.compose.enabled=false
spring.threads.virtual.enabled=true

# Spring security configuration
spring.security.enabled=true

# Database initialization
spring.sql.init.platform=postgresql
spring.sql.init.schema=orders
spring.flyway.baseline-on-migrate = true

spring.jpa.properties.org.hibernate.envers.default_schema=orders
spring.jpa.properties.hibernate.default_schema=orders

## Jackson configuration
spring.jackson.property-naming-strategy=SNAKE_CASE

## Profiles
spring.profiles.default=${SPRING_PROFILE_DEFAULT:integration-test}

## Database
spring.datasource.url=jdbc:postgresql://localhost:5432/orders
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

## Kafka
spring.kafka.bootstrap-servers=localhost:9092

spring.jpa.show-sql=true
spring.jpa.format-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.flyway.default-schema=orders
spring.flyway.schemas=orders

# Keep DB connection usage low under tests without starving Flyway, JPA and
# Actuator initialization, which can briefly need more than one connection.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=15000
spring.datasource.hikari.pool-name=base-payments-hikari-test

issuer.client.base-url=http://localhost:6580

# Actuator exposure for tests
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.enabled=true

# Tests do not need to export telemetry to the local Grafana/OTLP stack.
# Keeping exporters disabled makes the suite independent from observability containers.
management.otlp.metrics.export.enabled=false
management.tracing.export.otlp.enabled=false
management.logging.export.otlp.enabled=false

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.enabled=false
