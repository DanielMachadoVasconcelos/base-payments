spring.docker.compose.skip.in-tests=false
spring.docker.compose.lifecycle-management=start_only
spring.threads.virtual.enabled=true

# Spring security configuration
spring.security.enabled=true

# Database initialization
spring.sql.init.platform=postgresql
spring.sql.init.schema=orders
spring.flyway.baseline-on-migrate = true

spring.jpa.properties.org.hibernate.envers.default_schema=orders
spring.jpa.properties.hibernate.default_schema=orders

## Jackson configuration
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

## Profiles
spring.profiles.default=${SPRING_PROFILE_DEFAULT:integration-test}

## Database
spring.jpa.show-sql=true
spring.jpa.format-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

# Keep DB connection usage low under tests to avoid exhausting Postgres connections
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=15000
spring.datasource.hikari.pool-name=base-payments-hikari-test

issuer.client.base-url=http://localhost:6580

# Actuator exposure for tests
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.enabled=true
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

 eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.enabled=false