global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    basic_auth:
      username: 'GRAFANA'
      password: 'grafana'
    static_configs:
      - targets: ['host.docker.internal:9098', 'host.docker.internal:9099'] # Update to match app instances behind gateway
  - job_name: 'gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:7070']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']