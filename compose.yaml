services:
  postgres:
    container_name: postgres
    image: postgres:latest
    networks:
      - integration-test
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    command: ["postgres", "-c", "max_connections=200"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgadmin:
    container_name: pgadmin4
    image: dpage/pgadmin4
    restart: always
    networks:
      - integration-test
    volumes:
      - pgadmin4_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO - http://localhost:80/misc/ping || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    networks:
      - integration-test
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - '9092:9092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 120s

  akhq:
    image: tchiotludo/akhq:latest
    container_name: akhq
    networks:
      - integration-test
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            kafka-local:
              properties:
                bootstrap.servers: "kafka:9092"
    ports:
      - '8082:8080'
    depends_on:
      kafka:
        condition: service_healthy

  wiremock:
    image: rodolpheche/wiremock:latest
    container_name: issuer-wiremock
    networks:
      - integration-test
    ports:
      - '18081:8080'
    volumes:
      - ./wiremock:/home/wiremock
    command: --global-response-templating --verbose
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/__admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  observability:
    # Single local LGTM stack with native OTLP ingest for logs, metrics and traces.
    image: grafana/otel-lgtm:0.24.0
    container_name: observability
    networks:
      - integration-test
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'

volumes:
  kafka_data:
  postgres_data:
  pgadmin4_data:

networks:
  integration-test:
    driver: bridge
